<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="290" viewBox="0 0 1200 290" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#c0392b"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="290" fill="#f4f6f9" rx="12"/>

  <!-- Step 1: Recherche Client -->
  <rect x="64" y="50" width="120" height="100" rx="10" fill="white" stroke="#c0cad6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="124" cy="73" r="14" fill="#3498db"/>
  <text x="124" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1</text>
  <text x="124" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Recherche</text>
  <text x="124" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Client</text>
  <line x1="184" y1="100" x2="200" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Création Nouvelle demande -->
  <rect x="200" y="50" width="120" height="100" rx="10" fill="white" stroke="#c0cad6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="260" cy="73" r="14" fill="#3498db"/>
  <text x="260" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2</text>
  <text x="260" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Création</text>
  <text x="260" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Nouvelle</text>
  <text x="260" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">demande</text>
  <line x1="320" y1="100" x2="336" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Analyse -->
  <rect x="336" y="50" width="120" height="100" rx="10" fill="white" stroke="#c0cad6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="396" cy="73" r="14" fill="#3498db"/>
  <text x="396" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3</text>
  <text x="396" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Analyse</text>
  <line x1="456" y1="100" x2="472" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Check List -->
  <rect x="472" y="50" width="120" height="100" rx="10" fill="white" stroke="#c0cad6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="532" cy="73" r="14" fill="#3498db"/>
  <text x="532" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4</text>
  <text x="532" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Check List</text>
  <line x1="592" y1="100" x2="608" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Risque Analyse -->
  <rect x="608" y="50" width="120" height="100" rx="10" fill="white" stroke="#c0cad6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="668" cy="73" r="14" fill="#e67e22"/>
  <text x="668" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="white">5</text>
  <text x="668" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Risque</text>
  <text x="668" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Analyse</text>
  <line x1="728" y1="100" x2="744" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: Comité crédit -->
  <rect x="744" y="50" width="120" height="100" rx="10" fill="white" stroke="#c0cad6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="804" cy="73" r="14" fill="#e67e22"/>
  <text x="804" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="white">6</text>
  <text x="804" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Comité</text>
  <text x="804" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">crédit</text>
  <line x1="864" y1="100" x2="880" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7: Visite Management -->
  <rect x="880" y="50" width="120" height="100" rx="10" fill="white" stroke="#c0cad6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="940" cy="73" r="14" fill="#e67e22"/>
  <text x="940" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="white">7</text>
  <text x="940" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Visite</text>
  <text x="940" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Management</text>
  <line x1="1000" y1="100" x2="1016" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 8: Décaissement -->
  <rect x="1016" y="50" width="120" height="100" rx="10" fill="#5cb85c" stroke="#3d9140" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="1076" cy="73" r="14" fill="white"/>
  <text x="1076" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9140">8</text>
  <text x="1076" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Décaissement</text>

  <!-- Reject dashed arrows from steps 5, 6, 7 down to Rejeté box -->
  <!-- From step 5 (668, 150) -->
  <path d="M668,150 Q668,195 744,210" stroke="#c0392b" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrR)"/>

  <!-- From step 6 (804, 150) straight down -->
  <line x1="804" y1="150" x2="804" y2="208" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrR)"/>

  <!-- From step 7 (940, 150) -->
  <path d="M940,150 Q940,195 864,210" stroke="#c0392b" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrR)"/>

  <!-- Rejeté box -->
  <rect x="744" y="208" width="120" height="60" rx="10" fill="#e06060" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="804" cy="228" r="14" fill="white"/>
  <text x="804" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">✕</text>
  <text x="804" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Rejeté</text>

</svg>
